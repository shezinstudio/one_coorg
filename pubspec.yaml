  google_mobile_ads: ^9.0.0
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
  http: ^1.6.0
  geolocator: ^14.0.3
  intl: ^0.20.3

dev_dependencies:
