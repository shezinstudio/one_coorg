publish_to: "none"

version: 4.0.0+8

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^2.0.1
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4
  supabase_flutter: ^2.14.2
  share_plus: ^13.2.0
